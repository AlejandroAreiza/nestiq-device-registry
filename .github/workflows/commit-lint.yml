name: Commit Message Convention

on:
  pull_request:
    branches: [ main ]

jobs:
  commit-lint:
    name: Validate Commit Messages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate commit messages
        run: |
          COMMITS=$(git log origin/main..HEAD --pretty=format:"%s" --no-merges)
          echo "Commits to validate:"
          echo "$COMMITS"
          
          PATTERN="^(feat|fix|chore|refactor|test|docs|ci|perf|style|revert)(\(.+\))?: .{1,100}$"
          
          while IFS= read -r commit; do
            if [[ -z "$commit" ]]; then
              continue
            fi
            if [[ ! "$commit" =~ $PATTERN ]]; then
              echo "❌ Invalid commit message: '$commit'"
              echo "✅ Format: type(scope): description"
              echo "✅ Types: feat, fix, chore, refactor, test, docs, ci, perf, style, revert"
              echo "✅ Example: feat(device): add register device endpoint"
              exit 1
            fi
            echo "✅ Valid: $commit"
          done <<< "$COMMITS"